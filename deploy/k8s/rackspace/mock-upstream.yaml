apiVersion: v1
kind: Service
metadata:
  name: mock-upstream
  namespace: conduit-stress
spec:
  selector:
    app: mock-upstream
  ports:
    - name: http
      port: 18080
      targetPort: 18080
    - name: https
      port: 18443
      targetPort: 18443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-upstream
  namespace: conduit-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-upstream
  template:
    metadata:
      labels:
        app: mock-upstream
    spec:
      containers:
        - name: mock
          image: danqsi/conduit:mock-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18080
            - containerPort: 18443
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 18080
            initialDelaySeconds: 2
            periodSeconds: 5
