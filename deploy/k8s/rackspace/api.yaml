apiVersion: v1
kind: Service
metadata:
  name: conduit-api
  namespace: conduit-stress
spec:
  selector:
    app: conduit-api
  ports:
    - name: api
      port: 8443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conduit-api
  namespace: conduit-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conduit-api
  template:
    metadata:
      labels:
        app: conduit-api
    spec:
      containers:
        - name: api
          image: danqsi/conduit:api-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
          env:
            - name: CONDUIT_CONFIG
              value: /etc/conduit/conduit.toml
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /etc/conduit
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: conduit-config
