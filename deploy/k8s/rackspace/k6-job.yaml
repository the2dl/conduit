# k6 load generator — run as a Job.
# Set STRESS_TIER env var to choose tier: smoke|small|medium|large|enterprise
#
# Usage:
#   kubectl apply -f k6-configmap.yaml
#   STRESS_TIER=medium envsubst < k6-job.yaml | kubectl apply -f -
#
# Or edit the env value directly below.
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-stress-${STRESS_TIER}
  namespace: conduit-stress
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-stress
    spec:
      nodeSelector:
        conduit-role: loadgen
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          env:
            - name: TARGET_TIER
              value: "${STRESS_TIER}"
            - name: USE_MOCK
              value: "1"
            - name: HTTP_PROXY
              value: "http://conduit-proxy:8888"
            - name: HTTPS_PROXY
              value: "http://conduit-proxy:8888"
            - name: NO_PROXY
              value: ""
            - name: K6_INSECURE_SKIP_TLS_VERIFY
              value: "true"
            - name: RESULTS_DIR
              value: /results
          command:
            - k6
            - run
            - --summary-trend-stats=avg,min,med,max,p(90),p(95),p(99)
            - /scripts/k6-proxy-test.js
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "6"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 14Gi
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts
        - name: results
          emptyDir: {}
