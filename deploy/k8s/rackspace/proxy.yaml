# Internal headless service for metrics scraping per-pod
apiVersion: v1
kind: Service
metadata:
  name: conduit-proxy-headless
  namespace: conduit-stress
spec:
  clusterIP: None
  selector:
    app: conduit-proxy
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
---
# External LoadBalancer — this is what clients connect to
apiVersion: v1
kind: Service
metadata:
  name: conduit-proxy
  namespace: conduit-stress
spec:
  type: LoadBalancer
  selector:
    app: conduit-proxy
  ports:
    - name: proxy
      port: 8888
      targetPort: 8888
    - name: api
      port: 8443
      targetPort: 8443
  # Cloud LB will health-check via readinessProbe on the pods
  externalTrafficPolicy: Local  # preserve client IP for per-IP rate limiting
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conduit-proxy
  namespace: conduit-stress
spec:
  replicas: 3
  selector:
    matchLabels:
      app: conduit-proxy
  template:
    metadata:
      labels:
        app: conduit-proxy
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: conduit-proxy
      containers:
        - name: proxy
          image: danqsi/conduit:proxy-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
            - containerPort: 8443
            - containerPort: 9091
          env:
            - name: CONDUIT_CONFIG
              value: /etc/conduit/conduit.toml
            - name: RUST_LOG
              value: warn
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/conduit
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: conduit-config
