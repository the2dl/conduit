# DaemonSet that applies OS-level tuning on every node.
# Run this FIRST before deploying the proxy or load generator.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-tuning
  namespace: conduit-stress
  labels:
    app: node-tuning
spec:
  selector:
    matchLabels:
      app: node-tuning
  template:
    metadata:
      labels:
        app: node-tuning
    spec:
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: sysctl-tuning
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e
              echo "Applying network tuning for stress testing..."

              # TCP backlog — accept queue depth
              sysctl -w net.core.somaxconn=65535
              sysctl -w net.ipv4.tcp_max_syn_backlog=65535
              sysctl -w net.core.netdev_max_backlog=65535

              # Ephemeral port range — maximize available source ports
              sysctl -w net.ipv4.ip_local_port_range="1024 65535"

              # TIME_WAIT reuse — critical for high connection rates
              sysctl -w net.ipv4.tcp_tw_reuse=1
              sysctl -w net.ipv4.tcp_fin_timeout=15

              # File descriptors
              sysctl -w fs.file-max=1000000
              sysctl -w fs.nr_open=1000000

              # TCP memory tuning
              sysctl -w net.ipv4.tcp_rmem="4096 87380 16777216"
              sysctl -w net.ipv4.tcp_wmem="4096 65536 16777216"
              sysctl -w net.core.rmem_max=16777216
              sysctl -w net.core.wmem_max=16777216

              # Connection tracking — raise limits for high concurrency
              sysctl -w net.netfilter.nf_conntrack_max=1000000 2>/dev/null || true
              sysctl -w net.nf_conntrack_max=1000000 2>/dev/null || true

              # TCP keepalive — detect dead connections faster
              sysctl -w net.ipv4.tcp_keepalive_time=60
              sysctl -w net.ipv4.tcp_keepalive_intvl=10
              sysctl -w net.ipv4.tcp_keepalive_probes=6

              echo "Tuning complete."
      containers:
        - name: sleep
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "1m"
              memory: "1Mi"
      tolerations:
        - operator: Exists
