name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/conduit

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"

          PROXY_TAGS="${{ env.IMAGE_PREFIX }}-proxy:latest"
          PROXY_TAGS="${PROXY_TAGS},${{ env.IMAGE_PREFIX }}-proxy:${SHA_SHORT}"

          API_TAGS="${{ env.IMAGE_PREFIX }}-api:latest"
          API_TAGS="${API_TAGS},${{ env.IMAGE_PREFIX }}-api:${SHA_SHORT}"

          echo "proxy_tags=$PROXY_TAGS" >> "$GITHUB_OUTPUT"
          echo "api_tags=$API_TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          target: proxy
          push: true
          tags: ${{ steps.tags.outputs.proxy_tags }}
          cache-from: type=gha,scope=conduit
          cache-to: type=gha,mode=max,scope=conduit

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=conduit
